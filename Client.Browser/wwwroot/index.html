<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Gang Garrison</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div class="game-shell">
        <canvas id="theCanvas" class="game-canvas" width="800" height="600" tabindex="0"></canvas>
    </div>
    <div id="app"></div>
    <script src="_content/nkast.Wasm.JSInterop/js/JSObject.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Window.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Document.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Navigator.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Media.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Gamepad.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/Canvas.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/Canvas2dContext.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/CanvasGLContext.8.0.11.js"></script>

    <script src="_content/nkast.Wasm.XHR/js/XHR.8.0.11.js"></script>
    <script>
        window.OpenGarrisonBrowserHost = {
            hostState: {
                started: false,
                failed: false,
                status: "Not started."
            },
            gameLoopHandle: 0,
            gameLoopActive: false,
            gameLoopPending: false,
            gameLoopPendingStartedAt: 0,
            maxPendingPumpMs: 5000,
            gameLoopHost: null,
            preferSynchronousGameLoopPump: false,
            webSocketClients: {},
            inputBridgeHost: null,
            metrics: {
                loopStartedAt: 0,
                firstPumpStartedAt: 0,
                firstPumpCompletedAt: 0,
                completedPumps: 0,
                lastPumpDurationMs: 0,
                maxPumpDurationMs: 0,
                pumpCompletions: []
            },
            ensureKniGlobals: function () {
                const runtime = typeof globalThis.getDotnetRuntime === "function"
                    ? globalThis.getDotnetRuntime(0)
                    : null;

                if (runtime && runtime.Module && typeof globalThis.Module === "undefined") {
                    globalThis.Module = runtime.Module;
                }

                if (typeof globalThis.BINDING === "undefined" && runtime && runtime.INTERNAL && typeof runtime.INTERNAL.monoStringToStringUnsafe === "function") {
                    globalThis.BINDING = {
                        conv_string: function (pointer) {
                            if (!pointer) {
                                return null;
                            }

                            return runtime.INTERNAL.monoStringToStringUnsafe(pointer);
                        }
                    };
                }

                if (globalThis.Blazor && globalThis.Blazor.platform) {
                    if (typeof globalThis.Blazor.platform.readObject !== "function"
                        && typeof globalThis.Blazor.platform.readObjectField === "function") {
                        globalThis.Blazor.platform.readObject = function (pointer) {
                            return globalThis.Blazor.platform.readObjectField(pointer, 0);
                        };
                    }

                    if (typeof globalThis.Blazor.platform.getArrayLength !== "function"
                        && typeof globalThis.Blazor.platform.readInt32Field === "function") {
                        globalThis.Blazor.platform.getArrayLength = function (arrayPointer) {
                            return globalThis.Blazor.platform.readInt32Field(arrayPointer, 12);
                        };
                    }
                }

                return typeof window.nkJSObject !== "undefined"
                    && typeof globalThis.Module !== "undefined"
                    && typeof globalThis.DotNet !== "undefined";
            },
            isKniReady: function () {
                return window.OpenGarrisonBrowserHost.ensureKniGlobals()
                    && document.getElementById("theCanvas") !== null;
            },
            waitForCanvasFrame: function () {
                return new Promise(function (resolve) {
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            resolve(document.getElementById("theCanvas") !== null);
                        });
                    });
                });
            },
            describeCanvas: function () {
                const canvas = document.getElementById("theCanvas");
                if (!canvas) {
                    return "missing";
                }

                return "present " + canvas.width + "x" + canvas.height + " client " + canvas.clientWidth + "x" + canvas.clientHeight;
            },
            focusCanvas: function () {
                const canvas = document.getElementById("theCanvas");
                if (!canvas) {
                    return false;
                }

                canvas.focus({ preventScroll: true });
                return document.activeElement === canvas;
            },
            buildWebSocketUrl: function (host, port) {
                const normalizedHost = typeof host === "string" ? host.trim() : "";
                if (!normalizedHost) {
                    throw new Error("Browser multiplayer requires a server host.");
                }

                if (normalizedHost.startsWith("ws://") || normalizedHost.startsWith("wss://")) {
                    return normalizedHost;
                }

                const hostWithBrackets = normalizedHost.includes(":") && !normalizedHost.startsWith("[")
                    ? "[" + normalizedHost + "]"
                    : normalizedHost;
                const pageProtocol = window.location && window.location.protocol === "https:" ? "wss://" : "ws://";
                return pageProtocol + hostWithBrackets + ":" + port + "/opengarrison/ws";
            },
            openWebSocketClient: function (clientId, host, port, transportHost) {
                const api = window.OpenGarrisonBrowserHost;
                if (typeof WebSocket === "undefined") {
                    throw new Error("WebSocket is not available in this browser.");
                }

                const url = api.buildWebSocketUrl(host, port);
                const entry = {
                    id: clientId,
                    url: url,
                    host: transportHost,
                    socket: null,
                    isClosed: false,
                    isReady: false
                };
                api.webSocketClients[clientId] = entry;

                const notify = function (methodName, ...args) {
                    if (!entry.host || typeof entry.host.invokeMethodAsync !== "function") {
                        return Promise.resolve();
                    }

                    return entry.host.invokeMethodAsync(methodName, ...args).catch(function (error) {
                        console.error("Browser WebSocket callback failed.", methodName, error);
                    });
                };
                const closeEntry = function (reason) {
                    if (entry.isClosed) {
                        return;
                    }

                    entry.isClosed = true;
                    delete api.webSocketClients[clientId];

                    if (entry.socket && entry.socket.readyState === WebSocket.OPEN) {
                        entry.socket.close();
                    }

                    notify("HandleWebSocketDisconnect", reason || "WebSocket connection closed.");
                };

                const socket = new WebSocket(url);
                entry.socket = socket;
                socket.binaryType = "arraybuffer";
                socket.onopen = async function () {
                    if (!entry.isClosed) {
                        entry.isReady = true;
                        await notify("HandleWebSocketReady");
                    }
                };
                socket.onmessage = async function (event) {
                    if (entry.isClosed || !event.data) {
                        return;
                    }

                    let payload;
                    if (event.data instanceof ArrayBuffer) {
                        payload = new Uint8Array(event.data);
                    } else if (event.data instanceof Blob) {
                        payload = new Uint8Array(await event.data.arrayBuffer());
                    } else {
                        closeEntry("WebSocket payload was not binary.");
                        return;
                    }

                    await notify("HandleWebSocketMessage", payload);
                };
                socket.onerror = function () {
                    closeEntry("WebSocket connection failed.");
                };
                socket.onclose = function (event) {
                    const reason = event && event.reason
                        ? event.reason
                        : "WebSocket connection closed.";
                    closeEntry(reason);
                };
            },
            sendWebSocketMessage: function (clientId, payload) {
                const entry = window.OpenGarrisonBrowserHost.webSocketClients[clientId];
                if (!entry || entry.isClosed) {
                    throw new Error("WebSocket client is not available.");
                }

                if (!entry.isReady || !entry.socket || entry.socket.readyState !== WebSocket.OPEN) {
                    return false;
                }

                try {
                    entry.socket.send(payload);
                } catch (error) {
                    if (entry.host && typeof entry.host.invokeMethodAsync === "function") {
                        entry.host.invokeMethodAsync(
                            "HandleWebSocketDisconnect",
                            error && error.message ? error.message : "WebSocket send failed.")
                            .catch(function (callbackError) {
                                console.error("Browser WebSocket disconnect callback failed.", callbackError);
                            });
                    }
                }
                return true;
            },
            closeWebSocketClient: function (clientId) {
                const entry = window.OpenGarrisonBrowserHost.webSocketClients[clientId];
                if (!entry) {
                    return;
                }

                delete window.OpenGarrisonBrowserHost.webSocketClients[clientId];
                entry.isClosed = true;
                if (entry.socket) {
                    entry.socket.close();
                }
            },
            getCanvasInputPoint: function (event) {
                const canvas = document.getElementById("theCanvas");
                if (!canvas) {
                    return { x: 0, y: 0 };
                }

                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                return {
                    x: Math.max(0, Math.min(canvas.width - 1, Math.round((event.clientX - rect.left) * scaleX))),
                    y: Math.max(0, Math.min(canvas.height - 1, Math.round((event.clientY - rect.top) * scaleY)))
                };
            },
            attachInputBridge: function (host) {
                const api = window.OpenGarrisonBrowserHost;
                const canvas = document.getElementById("theCanvas");
                if (!canvas) {
                    return;
                }

                api.inputBridgeHost = host;
                const invokeHostVoid = function (methodName, ...args) {
                    if (host && typeof host.invokeMethod === "function") {
                        try {
                            host.invokeMethod(methodName, ...args);
                            return;
                        } catch (error) {
                            console.error("Browser host sync invoke failed.", methodName, error);
                        }
                    }

                    host.invokeMethodAsync(methodName, ...args).catch(function (error) {
                        console.error("Browser host async invoke failed.", methodName, error);
                    });
                };
                const isEditableEventTarget = function (target) {
                    if (!target || target === document || target === window) {
                        return false;
                    }

                    const element = target instanceof Element ? target : target.parentElement;
                    if (!element) {
                        return false;
                    }

                    return !!element.closest("input, textarea, select, [contenteditable=''], [contenteditable='true']");
                };
                const captureKeyboardForGame = function (event) {
                    if (isEditableEventTarget(event.target)) {
                        return false;
                    }

                    if (document.activeElement !== canvas) {
                        api.focusCanvas();
                    }

                    invokeHostVoid("HandleBrowserFocus", true);
                    return true;
                };
                const sendTextInput = function (text) {
                    if (!text || document.activeElement !== canvas) {
                        return;
                    }

                    invokeHostVoid("HandleBrowserText", text);
                };
                canvas.onmousemove = function (event) {
                    const point = api.getCanvasInputPoint(event);
                    invokeHostVoid("HandleBrowserMouseMove", point.x, point.y);
                };
                canvas.onmousedown = function (event) {
                    const point = api.getCanvasInputPoint(event);
                    api.focusCanvas();
                    invokeHostVoid("HandleBrowserMouseButton", event.button, true, point.x, point.y);
                    event.preventDefault();
                };
                canvas.onmouseup = function (event) {
                    const point = api.getCanvasInputPoint(event);
                    invokeHostVoid("HandleBrowserMouseButton", event.button, false, point.x, point.y);
                    event.preventDefault();
                };
                canvas.onwheel = function (event) {
                    const point = api.getCanvasInputPoint(event);
                    invokeHostVoid("HandleBrowserWheel", Math.round(event.deltaY), point.x, point.y);
                    event.preventDefault();
                };
                canvas.oncontextmenu = function (event) {
                    event.preventDefault();
                };
                window.onkeydown = function (event) {
                    if (captureKeyboardForGame(event)) {
                        invokeHostVoid("HandleBrowserKey", event.code ?? "", true);
                        if (event.key === "Backspace") {
                            sendTextInput("\b");
                        } else if (event.key === "Enter") {
                            sendTextInput("\r");
                        } else if (event.key === "Tab") {
                            sendTextInput("\t");
                        } else if (event.key && event.key.length === 1 && !event.ctrlKey && !event.altKey && !event.metaKey) {
                            sendTextInput(event.key);
                        }

                        event.preventDefault();
                    }
                };
                window.onkeyup = function (event) {
                    if (captureKeyboardForGame(event)) {
                        invokeHostVoid("HandleBrowserKey", event.code ?? "", false);
                        event.preventDefault();
                    }
                };
                window.onfocus = function () {
                    invokeHostVoid("HandleBrowserFocus", document.activeElement === canvas);
                };
                window.onblur = function () {
                    invokeHostVoid("HandleBrowserFocus", false);
                };
                canvas.onblur = function () {
                    invokeHostVoid("HandleBrowserFocus", false);
                };
                canvas.onfocus = function () {
                    invokeHostVoid("HandleBrowserFocus", true);
                };
                invokeHostVoid("HandleBrowserFocus", document.activeElement === canvas);
            },
            setManagedState: function (status, started, failed) {
                window.OpenGarrisonBrowserHost.hostState = {
                    status: status ?? "Not started.",
                    started: !!started,
                    failed: !!failed
                };
            },
            getManagedState: function () {
                return window.OpenGarrisonBrowserHost.hostState;
            },
            getAutomationState: function () {
                const api = window.OpenGarrisonBrowserHost;
                const host = api.inputBridgeHost ?? api.gameLoopHost;
                if (!host || typeof host.invokeMethodAsync !== "function") {
                    return Promise.resolve(null);
                }

                return host.invokeMethodAsync("GetAutomationState")
                    .catch(function (error) {
                        console.error("Browser host automation-state invoke failed.", error);
                        return null;
                    });
            },
            runAutomationConsoleCommand: function (commandText) {
                const api = window.OpenGarrisonBrowserHost;
                const host = api.inputBridgeHost ?? api.gameLoopHost;
                if (!host || typeof host.invokeMethodAsync !== "function") {
                    return Promise.resolve(false);
                }

                return host.invokeMethodAsync("RunAutomationConsoleCommand", commandText ?? "")
                    .catch(function (error) {
                        console.error("Browser host automation command invoke failed.", error);
                        return false;
                    });
            },
            invokeAutomationAction: function (actionSet, label) {
                const api = window.OpenGarrisonBrowserHost;
                const host = api.inputBridgeHost ?? api.gameLoopHost;
                if (!host || typeof host.invokeMethodAsync !== "function") {
                    return Promise.resolve(false);
                }

                return host.invokeMethodAsync("InvokeAutomationAction", actionSet ?? "", label ?? "")
                    .catch(function (error) {
                        console.error("Browser host automation action invoke failed.", error);
                        return false;
                    });
            },
            setAutomationValue: function (fieldName, value) {
                const api = window.OpenGarrisonBrowserHost;
                const host = api.inputBridgeHost ?? api.gameLoopHost;
                if (!host || typeof host.invokeMethodAsync !== "function") {
                    return Promise.resolve(false);
                }

                return host.invokeMethodAsync("SetAutomationValue", fieldName ?? "", value ?? "")
                    .catch(function (error) {
                        console.error("Browser host automation value set failed.", error);
                        return false;
                    });
            },
            connectAutomationTarget: function (hostName, portText) {
                const api = window.OpenGarrisonBrowserHost;
                const host = api.inputBridgeHost ?? api.gameLoopHost;
                if (!host || typeof host.invokeMethodAsync !== "function") {
                    return Promise.resolve(false);
                }

                return host.invokeMethodAsync("ConnectAutomationTarget", hostName ?? "", portText ?? "")
                    .catch(function (error) {
                        console.error("Browser host automation connect failed.", error);
                        return false;
                    });
            },
            startAutomationPractice: function (enemyBotCount, friendlyBotCount) {
                const api = window.OpenGarrisonBrowserHost;
                const host = api.inputBridgeHost ?? api.gameLoopHost;
                if (!host || typeof host.invokeMethodAsync !== "function") {
                    return Promise.resolve(false);
                }

                return host.invokeMethodAsync("StartAutomationPractice", enemyBotCount ?? 0, friendlyBotCount ?? 0)
                    .catch(function (error) {
                        console.error("Browser host automation practice start failed.", error);
                        return false;
                    });
            },
            getPerformanceSnapshot: function () {
                const api = window.OpenGarrisonBrowserHost;
                const host = api.inputBridgeHost ?? api.gameLoopHost;
                if (!host || typeof host.invokeMethodAsync !== "function") {
                    return Promise.resolve(null);
                }

                return host.invokeMethodAsync("GetPerformanceSnapshot")
                    .catch(function (error) {
                        console.error("Browser host performance snapshot invoke failed.", error);
                        return null;
                    });
            },
            getMetrics: function () {
                const metrics = window.OpenGarrisonBrowserHost.metrics;
                const now = performance.now();
                const recentCutoff = now - 5000;
                const recentPumps = metrics.pumpCompletions.filter(function (timestamp) {
                    return timestamp >= recentCutoff;
                });

                return {
                    loopStartedAt: metrics.loopStartedAt,
                    firstPumpStartedAt: metrics.firstPumpStartedAt,
                    firstPumpCompletedAt: metrics.firstPumpCompletedAt,
                    completedPumps: metrics.completedPumps,
                    lastPumpDurationMs: metrics.lastPumpDurationMs,
                    maxPumpDurationMs: metrics.maxPumpDurationMs,
                    recentCompletedPumps: recentPumps.length,
                    recentFps: recentPumps.length / 5,
                    pending: window.OpenGarrisonBrowserHost.gameLoopPending,
                    active: window.OpenGarrisonBrowserHost.gameLoopActive
                };
            },
            resetMetrics: function () {
                window.OpenGarrisonBrowserHost.metrics = {
                    loopStartedAt: performance.now(),
                    firstPumpStartedAt: 0,
                    firstPumpCompletedAt: 0,
                    completedPumps: 0,
                    lastPumpDurationMs: 0,
                    maxPumpDurationMs: 0,
                    pumpCompletions: []
                };
            },
            clearPendingPump: function () {
                const api = window.OpenGarrisonBrowserHost;
                api.gameLoopPending = false;
                api.gameLoopPendingStartedAt = 0;
            },
            recoverStalledPumpIfNeeded: function (reason) {
                const api = window.OpenGarrisonBrowserHost;
                if (!api.gameLoopPending || !api.gameLoopPendingStartedAt) {
                    return false;
                }

                const pendingDurationMs = performance.now() - api.gameLoopPendingStartedAt;
                if (pendingDurationMs < api.maxPendingPumpMs) {
                    return false;
                }

                console.warn("Browser host recovered a stalled frame pump.", reason, pendingDurationMs);
                api.clearPendingPump();
                return true;
            },
            startGameLoop: function (host) {
                const api = window.OpenGarrisonBrowserHost;
                api.stopGameLoop();
                api.gameLoopHost = host;
                api.gameLoopActive = true;
                api.resetMetrics();

                const pump = function () {
                    if (!api.gameLoopActive) {
                        return;
                    }

                    api.gameLoopHandle = requestAnimationFrame(pump);
                    api.recoverStalledPumpIfNeeded("animation-frame");
                    if (api.gameLoopPending || !api.gameLoopHost) {
                        return;
                    }

                    api.gameLoopPending = true;
                    api.gameLoopPendingStartedAt = performance.now();
                    const pumpStartedAt = performance.now();
                    if (!api.metrics.firstPumpStartedAt) {
                        api.metrics.firstPumpStartedAt = pumpStartedAt;
                    }

                    const finalizePump = function () {
                        const pumpCompletedAt = performance.now();
                        const pumpDurationMs = pumpCompletedAt - pumpStartedAt;
                        api.metrics.completedPumps += 1;
                        api.metrics.lastPumpDurationMs = pumpDurationMs;
                        api.metrics.maxPumpDurationMs = Math.max(api.metrics.maxPumpDurationMs, pumpDurationMs);
                        if (!api.metrics.firstPumpCompletedAt) {
                            api.metrics.firstPumpCompletedAt = pumpCompletedAt;
                        }

                        api.metrics.pumpCompletions.push(pumpCompletedAt);
                        const historyCutoff = pumpCompletedAt - 10000;
                        while (api.metrics.pumpCompletions.length > 0 && api.metrics.pumpCompletions[0] < historyCutoff) {
                            api.metrics.pumpCompletions.shift();
                        }

                        api.clearPendingPump();
                    };

                    if (api.preferSynchronousGameLoopPump
                        && api.gameLoopHost
                        && typeof api.gameLoopHost.invokeMethod === "function") {
                        try {
                            api.gameLoopHost.invokeMethod("PumpFrame");
                            finalizePump();
                            return;
                        } catch (error) {
                            console.warn("Browser host sync frame pump failed, falling back to async.", error);
                            api.preferSynchronousGameLoopPump = false;
                            finalizePump();
                            return;
                        }
                    }

                    api.gameLoopHost.invokeMethodAsync("PumpFrameAsync")
                        .catch(function (error) {
                            console.error("Browser host frame pump failed.", error);
                        })
                        .finally(finalizePump);
                };

                api.gameLoopHandle = requestAnimationFrame(pump);
            },
            stopGameLoop: function () {
                const api = window.OpenGarrisonBrowserHost;
                api.gameLoopActive = false;
                api.clearPendingPump();
                api.gameLoopHost = null;

                if (api.gameLoopHandle) {
                    cancelAnimationFrame(api.gameLoopHandle);
                    api.gameLoopHandle = 0;
                }
            },
            installCanvasFocusHandlers: function () {
                const api = window.OpenGarrisonBrowserHost;
                api.focusCanvas();
                const canvas = document.getElementById("theCanvas");
                if (canvas) {
                    canvas.addEventListener("pointerdown", function () {
                        api.focusCanvas();
                    });
                }
            }
        };

        window.addEventListener("load", function () {
            window.OpenGarrisonBrowserHost.installCanvasFocusHandlers();

            document.addEventListener("visibilitychange", function () {
                if (!document.hidden) {
                    window.OpenGarrisonBrowserHost.recoverStalledPumpIfNeeded("visibilitychange");
                }
            });

            window.addEventListener("pageshow", function () {
                window.OpenGarrisonBrowserHost.recoverStalledPumpIfNeeded("pageshow");
            });

            window.addEventListener("focus", function () {
                window.OpenGarrisonBrowserHost.recoverStalledPumpIfNeeded("focus");
            });

            window.addEventListener("resize", function () {
                window.OpenGarrisonBrowserHost.recoverStalledPumpIfNeeded("resize");
            });
        });
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
