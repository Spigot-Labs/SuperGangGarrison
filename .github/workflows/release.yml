on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to stamp into packages, for example 1.0.1'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Package Linux and Windows
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.event.release.tag_name }}"
          }

          pwsh ./scripts/package.ps1 -Platforms linux-x64,win-x64 -Version $version

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/OpenGarrison-Linux-x64.tar.gz
            dist/OpenGarrison-Windows-x64.zip
