name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bot-score-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build BotBrain tools
        run: dotnet build BotBrain.Tools/OpenGarrison.BotBrain.Tools.csproj --configuration Debug

      - name: Run BotBrain navigation smoke
        run: >
          dotnet BotBrain.Tools/bin/Debug/net10.0/OpenGarrison.BotBrain.Tools.dll
          --dump-room-objects true
          --map Harvest
          --area 1
          --team Red
